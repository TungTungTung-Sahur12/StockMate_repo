spring.datasource.url=${DATABASE_URL:jdbc:h2:mem:stockmate;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}
spring.datasource.username=${DB_USERNAME:sa}
spring.datasource.password=${DB_PASSWORD:}
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false

app.jwt.secret=${JWT_SECRET:StockMateDefaultSecretKey_ChangeInProd_123456}
app.jwt.expiration-ms=${ACCESS_TOKEN_EXPIRATION:3600000}
app.frontend-url=${FRONTEND_URL}
app.admin.enabled=${ADMIN_CREATE:false}
app.admin.email=${ADMIN_EMAIL:admin@stockmate.com}
app.admin.password=${ADMIN_PASSWORD:}
