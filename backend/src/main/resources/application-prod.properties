## Production Database Configuration
## Use environment variables for sensitive data

spring.datasource.url=jdbc:postgresql://aws-1-ap-northeast-1.pooler.supabase.com:5432/postgres
spring.datasource.username=postgres.hkzjqmbnmxlcpcxalqei
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

## JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false

## JWT Configuration
## Set via environment variable: JWT_SECRET
app.jwt.secret=${JWT_SECRET}
app.jwt.expiration-ms=3600000

## CORS Configuration
## Set via environment variable: CORS_ALLOWED_ORIGINS
## Example: https://example.com,https://www.example.com
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS}

## Server Configuration
server.port=8080
logging.level.org.springframework.security=INFO
logging.level.root=INFO
